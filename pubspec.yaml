name: claude_pilot
description: Mobile remote control for Claude Code via SSH
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.7.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  dartssh2: ^2.18.0
  xterm: ^4.0.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: 4.0.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  local_auth: ^2.3.0
  shared_preferences: ^2.5.5
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: 4.0.3
  build_runner:

flutter:
  uses-material-design: true
